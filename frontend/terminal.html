<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Terminal</title>
  <link rel="stylesheet" href="/css/terminal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
</head>
<body>
  <div class="terminal-layout">
    <div class="terminal-topbar">
      <div id="status-dot" class="status-dot connecting"></div>
      <span id="status-label">Connecting…</span>
      <span class="session-id" id="session-id-display"></span>
      <span class="age-counter" id="age-counter">00:00:00</span>
      <a href="/dashboard.html" id="disconnect-btn" style="
        color:#8b949e;
        font-size:12px;
        text-decoration:none;
        padding:2px 8px;
        border:1px solid #30363d;
        border-radius:4px;
        margin-left:8px;
      ">✕ Disconnect</a>
    </div>

    <div id="terminal-container"></div>

    <div id="terminal-overlay" class="terminal-overlay">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <h3>Session Ended</h3>
      <p id="overlay-reason"></p>
      <a href="/dashboard.html" class="btn">Back to Dashboard</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/terminal.js"></script>
</body>
</html>
